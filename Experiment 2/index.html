<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2>Employee Salary Management System</h2>
<label>Employee Name:</label>
<input type="text" id="name">
<label>Employee ID:</label>
<input type="text" id="empId">
<label>Salary:</label>
<input type="number" id="salary">
<label>Department:</label>
<input type="text" id="dept">

<br><br>

<button onclick="addEmployee()">Add Employee</button>

<br><br>

<button onclick="displayEmployees()">Display All Employees</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDepartment()">Count by Department</button>

<h3>Output</h3>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
