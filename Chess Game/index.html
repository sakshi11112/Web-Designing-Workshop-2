<!DOCTYPE html>
<html>
<head>
    <title>My Chess Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Chess Game</h1>

    <h3>Player 1 (Black Pieces)</h3>

    <div class="chessBoard">

        <div class="row">
            <div class="box white">♜</div>
            <div class="box black">♞</div>
            <div class="box white">♝</div>
            <div class="box black">♛</div>
            <div class="box white">♚</div>
            <div class="box black">♝</div>
            <div class="box white">♞</div>
            <div class="box black">♜</div>
        </div>

        <div class="row">
            <div class="box black">♟</div>
            <div class="box white">♟</div>
            <div class="box black">♟</div>
            <div class="box white">♟</div>
            <div class="box black">♟</div>
            <div class="box white">♟</div>
            <div class="box black">♟</div>
            <div class="box white">♟</div>
        </div>

        <!-- Empty Rows -->
        <div class="row">
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
        </div>

        <div class="row">
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
        </div>

        <div class="row">
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
        </div>

        <div class="row">
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
            <div class="box black"></div>
            <div class="box white"></div>
        </div>

        <div class="row">
            <div class="box white">♙</div>
            <div class="box black">♙</div>
            <div class="box white">♙</div>
            <div class="box black">♙</div>
            <div class="box white">♙</div>
            <div class="box black">♙</div>
            <div class="box white">♙</div>
            <div class="box black">♙</div>
        </div>

        <div class="row">
            <div class="box black">♖</div>
            <div class="box white">♘</div>
            <div class="box black">♗</div>
            <div class="box white">♕</div>
            <div class="box black">♔</div>
            <div class="box white">♗</div>
            <div class="box black">♘</div>
            <div class="box white">♖</div>
        </div>

    </div>

    <h3>Player 2 (White Pieces)</h3>

</body>
</html>
